name: iOS Build (Manual)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

  build-ios:
    name: EAS Build (iOS - ${{ github.event.inputs.profile }})
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build iOS
        run: eas build --platform ios --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait

      - name: Summary
        run: |
          echo "### 🍎 iOS Build Submitted" >> "$GITHUB_STEP_SUMMARY"
          echo "Profile: \`${{ github.event.inputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Check [Expo Dashboard](https://expo.dev) for build status and install link." >> "$GITHUB_STEP_SUMMARY"
