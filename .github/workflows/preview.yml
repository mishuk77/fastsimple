name: Preview Build

on:
  push:
    branches: [main]
    paths:
      # Trigger full build when native deps or config change
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'eas.json'
      - 'babel.config.js'
      - 'ios/**'
      - 'android/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: preview-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npx expo lint . 2>/dev/null || echo "No lint config found, skipping"

  build:
    name: EAS Build (${{ matrix.platform }})
    needs: quality-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all' && fromJSON(format('["{0}"]', github.event.inputs.platform)) || fromJSON('["android", "ios"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and wait
        id: build
        run: |
          # Run build and wait for completion — full logs stream to Actions output
          eas build --platform ${{ matrix.platform }} --profile preview --non-interactive 2>&1 | tee /tmp/eas-build.log
          echo "build_exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Build summary
        if: always()
        run: |
          echo "### 📱 ${{ matrix.platform }} Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Extract build URL or error from logs
          if grep -q "Build details" /tmp/eas-build.log 2>/dev/null; then
            BUILD_URL=$(grep "Build details" /tmp/eas-build.log | grep -oP 'https://\S+' | head -1)
            echo "✅ Build submitted: [View on Expo]($BUILD_URL)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -q "https://expo.dev/artifacts" /tmp/eas-build.log 2>/dev/null; then
            ARTIFACT_URL=$(grep "https://expo.dev/artifacts" /tmp/eas-build.log | grep -oP 'https://\S+' | head -1)
            echo "📦 **Download:** [$ARTIFACT_URL]($ARTIFACT_URL)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -qi "error" /tmp/eas-build.log 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Errors found in build log:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -i "error" /tmp/eas-build.log | tail -20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
